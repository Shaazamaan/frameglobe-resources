<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FrameGlobe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-top: 20px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .resource-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .resource-table th,
        .resource-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .resource-table th {
            color: var(--color-primary);
            font-weight: 600;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        .btn-edit {
            background: var(--color-primary);
        }

        .btn-delete {
            background: #ef4444;
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <div class="bg-gradient"></div>
    <div class="bg-pattern"></div>

    <div class="admin-container">
        <header class="hero">
            <div class="logo-badge">🛡️</div>
            <h1 class="hero-title">Admin Dashboard</h1>
            <p class="hero-subtitle">Manage FrameGlobe resources and mappings</p>
        </header>

        <div class="admin-card">
            <div class="admin-header">
                <h2>Resource Mappings</h2>
                <button id="addResourceBtn" class="submit-btn" style="width: auto;">
                    <span>+ Add Resource</span>
                </button>
            </div>

            <table class="resource-table">
                <thead>
                    <tr>
                        <th>Post ID</th>
                        <th>Name</th>
                        <th>Download Link</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="resourceTableBody">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>

        <div class="form-footer" style="margin-top: 40px;">
            <a href="index.html" class="login-link">← Back to Site</a>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="resourceModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modalTitle">Add New Resource</h3>
            <form id="resourceForm" class="lead-form">
                <input type="hidden" id="originalPostId">
                <div class="form-group">
                    <label for="postId">Post ID (e.g., beginner-sketching)</label>
                    <input type="text" id="postId" required placeholder="Enter unique ID">
                </div>
                <div class="form-group">
                    <label for="resourceName">Resource Name</label>
                    <input type="text" id="resourceName" required placeholder="e.g., Drawing Guide PDF">
                </div>
                <div class="form-group">
                    <label for="downloadLink">Download Link</label>
                    <input type="url" id="downloadLink" required placeholder="Google Drive direct link">
                </div>

                <div class="action-btns" style="margin-top: 20px;">
                    <button type="submit" class="submit-btn">Save Resource</button>
                    <button type="button" id="closeModalBtn" class="submit-btn"
                        style="background: #333;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
